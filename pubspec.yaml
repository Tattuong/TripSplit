name: tripsplit
description: TripSplit - Let's split the trip expenses.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.3
  intl: 0.20.2
  uuid: ^4.1.0
  package_info_plus: ^8.3.0
  in_app_purchase: ^3.2.1
  http: ^1.2.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#6C5CE7"
  adaptive_icon_foreground: assets/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
